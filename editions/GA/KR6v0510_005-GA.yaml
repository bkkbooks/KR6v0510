body:
  text: 澹雪居士顧岱止菴鑒定奉川後學戴明琮璧城纂輯詩賦唐㝛岳林寺盧天驥病骨倦鞍馬禪居欣少留暮雲山盡路孤磬月鳴樓林靜𨊵輈晚風香䆉稏秋重來坐磐石相對語歸休其二歎息老禪宿消閒心自如買松栽別塢引水過新渠草色經行外禽聲宴坐餘猶慚雙鬂白垂老尚征車其三報國竟無補敢辭山路遙晚寒生竹徑新漲斷溪橋奔走真逋客安閒愧老樵令人心欲折風雨夜瀟瀟遊岳林寺方干狀元投閒猶自喜古策剡東尋祇樹隨僧老龍溪遶岸深樓高春色晚天近日光陰共笑家聲舊何時解盍簮宋寓岳林寺李端民岳林溪畔接遙途兜率凄凉蔓草蕪幸有竹松閒作伴鐘聲夜半起羣烏登封山高元之邑侯號萬竹彌勒藏真處招提映碧空春風時聽鳥明月夜聞鐘欝秀屏開竹穹窿石畔松公餘閒眺望煙雨滿城中送宏智禪師還太白山樓鑰參政號大防堪憐宦跡逐風塵延訪猶疎覺路人明月迥懸無曲照片雲浮蕩屢傷神高山思仰方嗟晚古策殷遙悵暮春布袋一肩資選勝錫飛太白任天真秋半尋岳林寺梅堯臣郎官號聖俞杖履信天涯尋幽遍落花殿高秋氣爽林靜夕陽斜對茗情偏洽談玄興轉賖遠公相識好三笑過金沙送別敬山黃邑侯諱特釋志宣海印紫藤花發送君行惜別龍溪暗愴神目斷歸帆何太疾風吹柳絮正愁人惠政橋曾鞏郡守號子固城東新雨歇橋下水瀰瀰酒斾搖官柳漁舟傍野陂波平江岸濶沙漲石堤卑散步堪揮袖憑虛聽鳥啼寄大川禪師徐獻忠邑侯號長谷剡邑春期覲法王朱袍猶帶雨花香一從飛錫還山後殿角風微生夜涼元奉訪南公同登崇寧閣戴表元進士號剡源眾香壇晝靜游屐思頻來心轉談經處塵空說法臺葵花憑古碣竹色上蒼苔傑閣同禪院懸河有辨才惠政橋柱下詩無名鑿開蒼璧玉稜層叠作溪橋兩洞成影落波心雙月合光含石眼一星明鰲頭近接東西市鯨背平分南北程須信巨川從此濟區區溱洧浪傳名懷岳林水南禪師釋曇噩夢堂邑人百里鶯花入翠微孤城遙望白雲飛蘭生幽谷緣泉瘦蕨採衡茅帶雨肥鉢響儘催無澁體箭鋒不觸是玄機幾時重與支公話共笑龍溪挽落暉廣平湖栯堂益蘭若清幽處平湖瀲灧開波光留夜月雨色點蒼苔鷗浴蘋花動僧吟芳草催興來彈淥水俯仰自徘徊題幻住經堂黃溍諡文憲碧溶寺左老僧菴幻住深藏惠遠龕經有天龍來護法錫為埜鶴舞飛𩥵生公驚點千頭石優鉢能鋪滿座曇夢遶堂中花木勝禪關未許俗塵參娑羅樹王宗信邑侯移來西域此中栽歷盡風霜倚石臺最羨靈區能獨秀枝枝葉葉淨氛埃明駐金沙灘偶咏胡濙諡文定身承王事肅征轡耀金沙潮湧波光赤月明樹影斜樓臺冲碧落鷗鷺傍蒹葭悵望西風裏何年返故家岳林寺前作戴德彝探花號邦倫望中不盡龍溪水流入長江作大波獨有慈尊能砥柱清光一道鎮娑婆題岳林寺沈九疇方伯號箕仲肩輿隨處得相尋衰草荒烟古佛心莫問興亡前代事殘碑讀罷起孤吟封山禮定應塔錢璠邑令布袋依然在天門下座通石牀香界定寶塔法輪雄一笑風塵外千竿梵唄中無生誰共語可許問支公過岳林寺樓則中龍溪斜抱梵王宮樓閣蕭然映碧空芳草萋萋烟雨外誰憐慈氏冷春風遊岳林宿崇寧閣沈一貫相國諡文恭為尋淨土到龍宮笑口依然覿面逢池色雙空天界迥山光半落剡城東行看脩竹惟尊者坐對高樓有遠公參罷本無元字脚清溪鐘度吼松風登封山佛塔亭戴璟通參號屏石梓里投閒久封山禮塔頻香臺藏隻履佛蹟表千春巖下竹林秀庭前柏子新去來成幻景窣堵自嶙峋岳林禮彌勒大士黃端伯司李號海岸名剎巍巍俯碧川疎林喬木上參天僧從定處窺無相龍自蟠時護有年兜率荒基閒日月崇寧古閣繞雲煙我今稽首空王殿一片心香了夙緣國朝同提督田公宿崇寧閣王爾祿海憲號念尼西征欣有李將軍戎馬關山萬里雲內院棲遲聊晏卧悲笳短角不堪聞夕陽行倦息崇樓風捲旌旗動暮秋四野羣黎驚鶴唳三山孤月獨清幽宿岳林寺羅心樸理刑字夢章路出長溪夜未閑龍華臺畔寂中看霜飛木落千山靜月照庭空萬籟寒莫問雙林垂古蹟猶驚隻履現秋巒前朝事業都成夢心挹慈風法界寬送楷菴和尚還岳林董含進士號閬石舊山松檜已成圍萬叠煙雲一衲歸擬向岳林分半席娑羅枝上挂儒衣又張若羲進士號昊東四月綠陰滿送師歸越山經行青嶂裏洗鉢白雲閒去住原無著飄然不可攀何時隨布袋相對碧溪灣岳林寺贈楷大師史大成閣學號立菴蕭梁古寺剡溪隅為覽重興到勝區藉有安禪提祖印遂令雄剎麗輿圖娑羅樹放華為寶優鉢龍生雨是珠已見家風傳定應樓臺內院景還殊送楷菴和尚還岳林王日藻尚書號印周杯浮白苧記何年五閱霜華結制邊松徑待開卓錫地珠宮留滿布金緣慈雲輪演空中劫法雨花飛覺後天布袋一肩忘去住本無去住與茫然贈岳林楷和尚錢光繡聖月鄞人沿堤十里溯平津綠樹陰藏古寺春脈接龍溪臨孔道池開淨土在紅塵長汀寶所依然舊兜率玄風卓爾新岳色千秋鍾瑞氣於今果是再來人定應塔釋超朗弢穎住超果浮屠存異蹟隻履鎮封山蟬露神僧意花開古佛顏爐頭香氣藹石罅蘚痕斑一笑空歸去千秋天地間送別楷菴大師吳騏日千松江每過南郊寺清談接楷公樓高坐永日花靜度微風忽渡越江去蕭然嵓壑中閒雲兼野鶴相望隔遙空八聲甘州步東坡送參寥子韻懷岳林楷公周茂源進士號釜山歎士衡白帢被收來爭似季鷹歸問具區東畔華亭谷口釣艇殘暉細數微名蝸角深悔少年非午榻槐安夢點破禪機身入遠公蓮社看松枝拂處玉屑霏霏喜詩人相對車馬客來稀怪今朝聲沈清磬只隔思千里久相違何時曳杖龍溪上踏破苔衣遊岳林寺洪圖光進士字輝吉緣溪入古寺曲水映襌扉境別應超世僧高自息機紺壇清梵靜丹閣午鐘微初地重新後秋來滿碧輝題岳林贈楷大師顧岱郡侯號澹雪虛空無體迥無羣彌勒尊前香自焚破盡妄緣依片石撥開眼界任浮雲踏蘆渡海存何跡說偈飛花是此君化現至今留法乳松陵到處有鴻文指南軒同施大尹楷和尚茶話塵情佛土兩歸空永日南軒一笑中學士參禪無色相遠公揮麈起清風庭前柏子枝還綠戶外茶聲火正紅莫道虎溪今僅事會看獅座據高崧秋日過楷菴指南軒施𠟭曾邑侯號省園山淡明秋色乘閒到梵林落花聞說法疎雨見禪心牆拂梧陰亂𥦗含雲影深三酸堪續畫竹院且行吟澹雪省園護法指南軒茶話次韻釋真承指南靜坐萬緣空偕有維摩話此中竹影蒲團雲入畫茶香石鼎腋生風窺簾桐葉雙眉綠傍檻芙容滿眼紅機鈍那堪留玉帶儼然一會在廬崧岳林次原韻酬澹雪先生戴明琮治郡高名久出羣何當解組瓣香焚清吟梵閣千秋韻勝賞龍溪萬頃雲三絕長康原玩世重來支遁幸逢君西湖事業東林興喜勒新編有大文娑羅樹顧峵渭若孝廉優曇花不發難得此娑羅西域移根古南天洒露多香臺擎皓月密葉證微波碩果由來結菩提永不磨長汀渡長汀遺聖蹟彌勒亦浮沉偶逐兒童戲誰知天地心中流依斷石古岸覆清陰問渡秋林晚幽蹤何處尋同周玉光至岳林鄭愫邑令號蒼巖白業高僧得青蓮法雨遙官閒能話舊寺古記前朝花氣流雙袂鐘聲到一瓢重來磐石上趺坐萬緣消題指南軒茶話趙玉涵藍田錫山山色秋光影動搖幽窗開處草蕭蕭蒲團日照禪心靜香案花飛法界遙四壁澷題摩詰句一牀猶掛虎丘瓢客來爐火茶初熟相對談詩破寂寥封山釋淨敏融徹住水簾古佛留遺跡千年舊梵宮鳥啼青靄外磬響翠微中徑竹埋雲暗巖花帶雨紅夕陽遲返屐高閣聽松風臘月宿崇寧閣留別楷公曹鼎臣邑侯字掄生剡東崇閣插浮雲信宿棲遲歲欲分蓮社尋常欣有托輿情未恤竟無聞霜鐘風鐸閒來韻檐鴿林鳥自作羣正擬談玄何遽別梅花枝上雪紛紛遊岳林寺千佛閣陳錫嘏編修號怡庭真空原不滅定應至今存百億身常現樓臺景自繁寶林雙樹茂金相一龕尊我亦來彈指雲關許叩閽龍眼池王喬新貢士號鳬僊龍眼雙池碧芳名千載傳宦遊搔鬢短臨照更皤然廣平湖戴昆槱芃菴文學唐相遺徽著此鄉澄波原自傍雲堂蕖枝應是青蓮種荇帶猶含紫綬光勝聚一杯留古蹟澤涵千畝玩滄桑名傳長列山門景還與梅花賦並香崇寧閣禪宮巍閣壯林丘金相層層列上頭彌勒化身真百億崇寧遺制自千秋應令浩劫傳文岳況復中興有惠休題額肅瞻先蹟在梵天長映五雲稠贈楷公重興岳林蔡毓秀邑侯號一齋一竿布袋已重新岳色蒼然別有春偶爾宦遊親覿面虎溪三笑再來身讀書古崇寧閣鄔棐迪公孝廉耽靜棲身百尺樓凉飇拂袂思悠悠疎鐘聲徹龍溪月孤幌光寒鴈蕩秋滿架詩書千古事經年勛業寸心籌翛然地僻紅塵遠嬴得心空萬慮休寄贈岳林楷大師曹王雲進士號鶴坡聲聞補處會人天金粟如來授記年坐久繩牀餘半偈興來蓮社著新篇蒼崖鹿趁擕笻路碧澗龍依洗鉢緣何日重逢方丈室塵蹤遠絕共逃禪題岳林寺釋真心自牧住法海漫勞彈指對雲扉樓閣重重敞曙暉水漾雙池龍眼活風搖萬竹鳳毛揮老僧接客無三等稚子逢人露一機為問眾中誰姓蔣而今布袋更堪依同璧城登崇寧閣釋德禮乾岳住粹陽滿目春山澹欲浮偶然到此共登樓風吹隔岸垂楊外野渡閒橫一葉舟岳林攬勝劉鴻聲殿聞貢士金沙秀擁龍津頭奈苑重興三勝流閣闞四郊峩嶺道門迎一葉剡溪舟朝暘初出懸燈曉宿霧新收紺殿秋支遁雨花天際下長汀白水遶朱樓懷岳林楷菴兄兼述景勝釋真貫山慵住雁蒼客從梓里來言師老益健蕭蕭半白須風骨純鋼鍊手扶舊剎竿金碧輝雲漢古佛亦有光粲然開生面長汀渡口船盛接方來彥有樹曰娑羅死株復榮蒨紛紛樹陰中赤眉白足踐任渠捋虎鬚龍眼明如電金鐘日鍠鍠聾者自不見所以淨土池別開一方便繇梁迄至今千載古壇墠莖草現寶坊絢赫如內院縱有他心通莫測其神變快哉聆此言手脚輕欲漩顧據此席者屈指曷勝筭機用若較師蓋一以敵萬即如契此翁風顛亦何羨偎卧惠政橋飲啗不擇膳臨行四句偈技癢露一線既曰百億身有何定可戀必謂竁封山豈應別州縣吾生廣平鄉與師同里閈幼戲三山園聚塔金沙岸今老天一方川廷豈汗漫疎慵性所躭鄉情獨不倦溯其何從來彌勒亦親串長汀懷舅氏暌闊欲一看崇寧高閣中併期慰深眷送楷公歸岳林宋慶遠進士號源餘白苧西城送客歸臨岐搔首倍依依𡧓留法語當慈筏聊摘山雲補衲衣夜半聞鐘人乍醒天涯擕錫鶴同飛金峩雪竇松風夢別後相思隔翠微龍眼池顧岱止菴古剎雙池闢清淵見太和江湖同一脈日月此中過野色澄初地閒雲映碧莎千年常寂歷何處有風波定應塔妙有已乘化真如此獨存一坏留杖履雙眼納乾坤翠竹籠雲氣蒼松印石痕借山應借水歷劫與誰論遊岳林酧楷公黃尚賓龍溪活水護禪林自在莊嚴彌勒心忽遇楷公一拍掌亂雲孤月耀千尋淨土池釋心謙古田住青蓮異景傳初地清涵淨土池一洼綿浩劫半畝照須彌白玉浮蓮瓣明霞漾錦漪臨波梵天月珠色燦摩尼三過岳林喜晤楷公張起宗孝廉號目山坐愛松林干樹青袈裟長日對雲屏留分鉢粒香𢊍暖喜看珠宮花雨零揮麈不教靈鴿避談𤣥時有毒龍聽到來重憶經遊地依舊門前溪水泠訪楷兄時璧公輯志初成釋延瑞景雲住大慈飄然恣遠屐野徑剡城東溪闊藏鳬鳥樓高俯雁鴻新髯玄欲白古剎替還隆有子搜遺典先賢法眼通崇寧閣梁塤令吹文學倚杖登危閣憑空望泬寥日斜村樹杳風送海雲遙竹影飄青幔鐘聲度綠蕉忽聞天語近疑