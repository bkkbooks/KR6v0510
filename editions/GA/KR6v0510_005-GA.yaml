子何處追尋鼎等每對蒼茫而不返悵矣金沙常懷奕葉之相傳睠焉布袋爰埽拈花淨榻特延飛錫高蹤倘得鉢洗龍泉漁唱一溪齊梵語庶幾珠傳象罔鐘聲千載響祇園凡属皈心胥為候駕謹啟曹鼎臣夏大謀徐日敞同具請楷菴承禪師住岳林禪寺開堂啟伏以道法攸關惟在傳持慧命叢林克振全憑整頓山門布袋重提法輪復轉恭惟楷菴大和尚南越人品東吳大禪曾於竹箆翻身動容正揚古路後從醬瓿撲破爪牙重奮獰威家學淵源懋修聿力克維名教乃正道之籓籬繩武聖賢為人中之豪傑兹者岳林古剎彌勒道場闢草誅茅功由開創撒風打雨端賴中興邇來鐘鼓不靈幾使禪林之隳廢時方人天共仰豈宜法席之久虛伏冀俯順羣言力肩大任允副輿望立舉弘綱會見石鼓驚天桐扣訕茂先之拙行看桃花照地尋劍笑靈雲之遲祈蒞名山慰予仰止謹啟李國標舒其昌鄔銓明項壽祖宋之鉉俞廷瑞梁塤項强王喬新汪緯呂道昌劉鴻聲孫翼清劉志高周志宣江卓孫懋賞嚴泗舒勳周舜臣張進昌戴陞宋湯建王所勸孫冢戴昆槱傅備舒順方戴周禮孫際亨舒明邃孫嗣顗戴亨運項一蜚舒順正呂大紀陳禹謨戴元賢同具募疏岳林禪寺齋僧募疏史大成閣學號立菴璧城剡源先生裔孫也憶癸丑歲同家姪孫嗣仁刻感應諸書詣余索序幾六載復訪於余快談竟日璧城曰自方外遊素不曾供眾行行當來必少其福岳林古道場楷老人大興佛宇緇素雲臻特請題疏以募四方余曰唯唯當今盡大地凡出世而精勵者莫不受靈山付囑皆以植福為念此璧城深植德本故耳俗家以布施齋僧為種福僧家以行行供眾為修福其理即一然則將以求福而福歸之其故何哉蓋所施者齋而所以施者非齋也但世間有勸之而念始興導之而意始發惟祈諸賢同志廣成其願故曰大家有分云耳余故不辭璧城之請而樂為之弁其
