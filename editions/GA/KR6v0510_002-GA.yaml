body:
  text: 澹雪居士顧岱止菴鑒定奉川後學戴明琮璧城纂輯名勝三山岳林主峰也脉自南來入廣平湖過峽為三山高丈許松篁掩映花鳥爭香龍溪自鎮亭發源由惠政橋至寺前循栗樹塘抵金鐘墪屈曲環抱夾岸蘆花遊人競渡廣平湖唐奉化令宋嗣宗係文景公璟之曾孫卜居邑東斗門不忘其祖故名湖曰廣平在三山左元至元間取資國堰水入湖溉田二千餘畝延祐庚申知州事馬公浚之至正中郡侯李公復開利甚溥宋榮詩云相業何人補湖光自古流龍眼池在天王殿前左右二池周圍三丈許相傳謂之龍眼大旱不竭真宗禪師詩曰欲知慈氏靈湫遠龍眼雙池萬古明封山脈自大雷來逶迤而至日嶺側起一峰轉為數峰嶄然突起曰青錦山又名蓮華巖左開一面體勢雄壯曰封山茂竹蒼松蔚然深秀中建佛塔亭布袋和尚真身隱此有鉢盂古迹存焉淨土池在天王殿右廣可丈許芙容繞岸綠樹埀陰長汀渡距寺五里水出龍溪潮通北渡布袋老人曾浴此與羣兒嬉長汀子所由名也金沙灘即寺前左首灘湧石沙色如金廣數十丈樓㙜瞰碧鷗鳥迎人水南禪師詩曰兩岸樓臺不一家年年流水泛金沙幾囘曳杖閒中望石上青苔覆落花惠政橋距寺左一里宋乾道中建復壞大觀中架木為梁覆以屋攺今名廢興凡五次載縣志皇清康熙五年邑令張奎胤延解齊大師重建綿延二十間南接台溫北通寧紹奉邑之雄鎮也金鐘墪寺北五里長汀之下或傳錢氏載大金鐘過此沉焉漲沙成墪墪絕小下有龍潭六月二十日有司致祭林木頗茂雖山泉衝盪亦無損見志兀誌耀碑潭去寺一里在大溪之西父老相傳官清則碑現載寰宇紀古蹟大鐘沙門景湘水南氏識曰余住持岳林十有三載經營鑄造已渉九年凡募化隨緣錙銖所得輒運寺中於天曆三年庚午四月二十日穀旦方得告成敬為之述其事而系以銘曰晨昏扣擊警醒愚𫎇𡨚親平等俱出樊籠隨喜聞見耳覺圓通旌之我銘祖室攸崇幽冥息苦塵刦靡窮洗面石長二丈濶四尺二寸深四寸可以出水并石魚四尾安置茶房門首左刻梁貞明四年三月八日吉旦布袋和尚行卧處在封山中塔後路旁石巖處鉢盂足跡隱隱猶存娑羅樹定應大師手植歷唐宋元寺幾經灰燼樹獨無恙明季枝葉凋零至楷老人入院仍復暢茂騷客多所題贈雲間鷹垂周公撰記康熙乙丑春方丈前忽生一小株眾異之今並列云彌勒涅槃石梁貞明三年三月三日布袋和尚涅槃此石方四尺五寸安置千佛閣下順治間提督田公駐劄為兵所損尚存片碣焉
