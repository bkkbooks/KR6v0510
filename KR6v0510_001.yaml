body:
  text: 淡雪居士顧岱止菴鑒定奉川後學戴明琮璧城纂輯梵宇嶽林禪寺古志寺距縣北五里梁大同二年始創溪西名崇福院唐相李紳書額會昌中毀大中二年歷志載三年誤閒曠禪師徙建溪東改嶽林寺僖宗時有僧遊寓常擕布袋乞食人稱為歡喜和尚自號長汀子至貞明三年坐東廊磐石說偈而逝宋真宗祥符八年賜額大中嶽林禪寺仁宗賜御製書札徽宗賜號崇寧閣文嶽禪師建有十景題閣後燬復建元至元十九年九月閣崩住持梵中重搆明永樂癸卯火宣德正統時修復萬曆間又火南禪師同僧萬金等重建大殿崇寧閣皇清順治間自閒天伊解齊諸禪師相繼主持寺事後寺僧因官逋他徙寺圮康熙十二年癸丑衆檀護敦請楷菴和尚入院大暢宗風皈依雲集創天王殿方丈大殿兩廂又造普同塔百廢具舉臬司印周王公碑記大雄寶殿明萬曆三十六年戊申九月二十六日住持南禪師同萬金萬全捐資協建計七楹高六十二尺縱九十八尺廣一百二十四尺康熙庚申臬司印周王公重新舊額敕賜大中嶽林禪寺八字崇寧閣明崇禎三年二月初十日僧守愚法緣重建計七楹高五十二尺縱七十四尺橫一百二十四尺中五楹上供千佛下供彌勒大像左閣為祖堂餘為首事寮中有大光明藏古崇寧閣彈指門開等額兜率宮址遺千佛閣後創自定應大師今圮天王殿七楹高五十二尺縱六十三尺廣一百二十四尺中三間供天王東為雜務寮西為雲水堂康熙十五年丙辰建方丈居崇寧閣左共五楹高二十五尺縱四十二尺廣八十九尺左右各廂五楹左為指南軒右侍寮康熙戊午年建禪堂五楹即崇寧閣下基址在方丈前祖堂即崇寧閣左康熙丁卯春上堂安座伽藍堂大殿前左康熙戊午年建戴元賢題曰正氣冲霄祖師堂大殿前右康熙辛酉年建應供堂五楹在大殿左康熙戊午年建日新堂大殿前左五楹康熙己未年建香積廚五楹在大殿左舊存二客堂大殿前右五楹供大悲像康熙辛酉年建至善堂為崇寧右輔三楹安住戒師舊存涅槃堂在祖師堂側計二楹茶房崇寧閣右計三楹舊存庫房崇寧閣左三楹康熙戊午年建浴室淨房碾磨坊田寮園房十三楹俱在茶房後康熙戊午年建鐘樓天王殿左高五丈餘元天曆三年鑄成銅萬斤有奇聲聞二十里僧越凡司鐘不法邑侯蔡公復歸常住康熙乙丑年用價二拾肆兩贖田肆畝丁卯春重修輪藏與鐘樓相對在天王殿右所以藏經者中置轉輪畫柱雕龍時或轟雷閃電帶雨發聲亦一奇也唐布袋和尚建順治間毀山門在天王殿前五楹今圮幻住經堂本寺之左水南湘禪師所建今圮鐘樓經堂寺左數十武即鐘樓下三楹兩廂今存塔院三山園左面挹廣平湖正三楹㫄各五楹坐乾向巽乃楷菴老人壽藏也自題曰宴然康熙癸亥年造普同塔寺園之東坐卯向酉砌石為藏三頂三壙康熙乙丑年造寶塔天王殿前龍眼池側左右兩座高四丈餘相傳謂之龍角布袋和尚遺蹟也又山門前浮圖七座其一久毀彌陀亭寺左道旁有彌陀石像高可八尺其亭鄰義塜遠近居民謂能為禍福皆祀以雞黍解齊大師入院見薦牲者殊穢褻遂說偈火其像亭亦燬佛塔亭封山之腹距寺三里梁貞明間建大殿五楹結龕為窣堵波亭中塑布袋和尚十八兒童環繞之四圍石座彌勒法身藏焉後圓明禪師重新塔亭里人馮斯道何智施山地增擴其基忽發異光掘之獲黃色淨瓶六環錫杖制度奇古觀者太息有司上其事敕賜定應大師塔康熙十七年住持如暢同徒性聞復新中塔建左廂三楹供關聖右廂七楹供祖師外為客寮理刑黃端伯題曰分身揚化邑侯孫嗣先題曰常羊淨土邑令夏時正題曰真跡傳宗大參塢鳴雷題曰敕賜定應大師之塔邑侯蔡育秀題曰佛化真境進士俞廷瑞題曰古佛重來牧雲門禪師題曰龍華現相定應塔院封山之麓順治五年僧三笋重建大殿邑令王奐書疏左廂五楹供伽藍祖師今圮右廂為齊堂後二十餘楹客堂廚房并各寮康熙丁卯如暢性聞建山門奉師塔寺北六里在應家山東創自蔣摩訶居士明季毀康熙乙卯年僧恆泰同徒聞悅重興三楹兩廡莊嚴佛相修古洞塔并置産若干石城編修陳捷撰記青雲菴寺西六十里石門銀坑嶺側徐宅所施順治間僧真寂字體常始創精廬供佛今為嶽林退居柴菴在城西嶴相去十里山八十餘畞內四十畝錢偉才所施屋三楹兩廊康熙庚申年建嶽林莊求村十字塘距寺八十里布袋和尚以囊沙壘為塘塘成如石以捍海潮仍設三碶以禦旱潦塘內得田二千餘畝每歲收穫給僧徒歲久碶塘為潮所衝悉成海塗康熙間奉旨遷海僅存田三十三畝地四十三畝山五百畝順治初莊屋廢今重復普惠莊寺東浦口莊二東西各一計田四百三十畝至明季田莊為房僧盡廢西莊址為豪右所奪東莊址尚存康熙十八年嶽林常住新置田三十餘畝右寺中已建者録其實未建者存其名昔所建而今不必建者亦附載之以識舊蹟云爾
