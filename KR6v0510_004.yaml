body:
  text: 淡雪居士顧岱止菴鑒定奉川後學戴明琮璧城纂輯藝文布袋老僧小序沈一貫相國諡文恭聖人觀衆生心是般若智生死海是涅槃城昧而不知速須道破念慈氏受釋尊之記當末世開度生之方由是降兜率遊四明觸處建光明藏逢人施甘露味以布袋為佛事以小子現童真四儀神變莫測六時妙化無窮登禪窟者死偷心於絶解之處活佛機於難辨之時是故拈花悟旨響應千古笑談垂手針芥相投俾放下布袋默契禪宗政不待言思而得者教外別傳之旨也噫余以為補處老僧贅千百載之剩語耳刻布袋大師傳贊序戴澳大京兆號斐君大慈氏為未來佛此釋氏之言也夫既謂之佛有何現在有何未來如曰如來則已來而為傅大士又來而為布袋僧且曰化身千百億則其不為傅大士不為布袋僧而原為彌勒者恆河沙中又不知其幾故曰時時示時人時人俱不識其曰未來者是其補處正位其無時不來者是其大慈熱腸蓋慈之一念無刻能與衆生相忘無刻不與衆生相接誰無佛性忍其沉迷誰非佛身忍其流浪則誰非彌勒行化之時忍委之未來而徒以百億樓閣自祕其笑口布袋之為彌勒時人原未嘗識彌勒之不必為布袋時人更未之識彌勒既欲時時示人又欲人時時必識則慈化亦不厚矣布袋已是彌勒影子又欲而為之傳贊傳布袋耳贊布袋耳百億化身局一布袋時人眼根終是不圓秖能識布袋師終未能識彌勒則彌勒原在不動寂場則謂之未來亦可明州布袋和尚序王章鄞令忠烈我不識彌勒何許人現示何世明州人傳云這胖和尚喫酒喫肉布袋自隨生大輕慢以紙包屎物示人云這是彌勒內院的這是兜率陀天的惡氣熏布惑亂此方女男前莆田令好沒來由與渠往來通消息當時幸不遇我遇我則問渠是甚麼待他放下布袋叉手向前便驀頭一棒他問過在甚處又與一棒曰打破布袋子管教他無言可答且教他那十七八個小孩子都哭啼啼呌腦痛去也咄彌勒傳序包士瀛百登吾聞聖賢之道當人自具不假外求秖因塵勞自閉彼岸自迷平白地屈陷於生死之中飄泊於輪回之際且阿逸多氏釋尊授付佛乘囑行佛事故修途萬品總攝一宗即妄顯真就事明理納諸佛法印於袋中運無量神通於掌內直欲將諸人無始劫來學識因緣今日要與和盤翻轉截却生死根源徹悟無生性智即是全體彌陀惟心淨土只爭迷悟一著耳故傳云即個心心心是佛十方世界最靈物縱橫妙用可憐生一切不如心真實豈欺我哉題布袋和尚後序張庚星孟辛不佞星乃懸榻齋中臯比座上人也與天竺禪宗了不相入亦不知赤鬚白足為佛果上乘晚讀寶積楞嚴頗能作點頭石狀始知太傅之與如滿蘇長公之與了元道潛作空門針線良有以也昨者管子無棘以朗寂上人所撰布袋和尚後序示余盥而讀之訝然悟布袋之為補代也蓋權位菩薩假布袋以遊嬉三昧而世人不識耳余初不識朗寂安能識布袋之為彌勒由朗寂而識彌勒由彌勒而識朗寂以佛門上乘寫青蓮彩毫其於寶積楞嚴若親授記莂於如來匪但拈槌竪拂於蓮池大師也火煨蹲鴟熟否幸分惠我一枚容作再來布袋後序以謝重刻彌勒傳序周綸鷹垂雲間人韓之言曰道於楊墨老莊佛之學而欲之聖人之道猶航斷港絶潢以望至於海也韓之言亦不審天地之大古今氣運之變儒其人孔孟其衣冠而肆然蕩間敗檢於君師政教所不及者多耳然則季世末俗生天地獄之説謂即大易神道設教之旨也可歐文忠平生詆佛老晚聞富韓公得道於淨慈本老以為富公非苟下人者因時與法師住白曰吾學空門非學仙而世傳有海外樂天院乃知天地間英靈之氣不在此則在彼正不必吾儒之與佛老岐而別之也白有詩云無事日月長不羈天地闊要為吾輩長坎壈人急用犍椎較孟東野出門即有礙誰謂天地寬句奚啻徑庭哉晦堂老子嘗問山谷吾無隱乎爾之義曰聞木樨香乎山谷曰聞晦堂曰吾無隱乎爾山谷大服宗杲論禪云譬如人載一車兵器弄便不是殺人手假我則只有寸鐵朱文公亦喜其説此即曾子守約地位趙清獻告老歸暮冬尚能日禮佛百拜誦經司馬溫公亦曰吾豈謂天下無禪乎夫人學問行誼如數公亦可已矣數公之於二氏其盡闢乎不盡闢乎今人類不能如數公儒其人孔孟其衣冠動曰老氏釋氏吾與之為芟榛莽刮瑕垢噫亦隘矣唐書載陸餘慶與釋懷一為方外十友當武后中宗時士多暴貴驟顯其禍敗誅死亦不旋踵獨餘慶官太子詹事雖不甚顯訖無咎悔要其得空門棄去一切之益為多葉少蘊言唐自懿僖後人才日削至於五代謂之空國無人可也浮屠中乃有雲門臨濟德山趙州數十輩人卓然超世自可與扶持天下配古名臣然後知其散而橫潰猶有在此者也佛者言布袋和尚亦介唐僖宗時嘗卧雪中不沾衣示人吉凶應期無爽而嶽林宗風藉以不墜今楷菴和尚為費老人法孫離言和尚克家子蚤契真如精進上乘兼攻苦我儒之所為業向駐錫松之超果人天皈仰時貶拔示文字禪書摹董宗伯詩酷似三唐歲在癸丑應明州士大夫之請主席嶽林闡揚宗旨至則披荊範土度材鳩工自天王殿方丈迄僧寮庖湢等顛者植汙者堊闕者復輪奐一新復念嶽林為彌勒古道場舊有傳記鋟棗梨蕩焉煨燼募檀信顧居士聞遠捐資高足璧城校訂重付剞劂屬豫為之序豫一日邀公設茗相訂嶽林遊屐恍膜拜彌勒座下因誦杜老詩云昔遭衰世皆晦迹今幸樂國養微軀依止老宿亦未晚富貴功名焉足圖我竊為斯人執鞭我素願也康熙癸亥閏六月望前五日敕賜嶽林禪寺幻住經堂記慶元路開壽普光禪寺住持沙門曇噩撰文正議大夫開元路總管兼管內勸農事王元恭書丹資德大夫浙東道宣慰使都元帥張完澤篆額幻住經堂者嶽林水南和尚之所作也和尚以逹摩氏心宗為世師表是宜扞絶文字直見性元以倡後學而猶尋章討句蔽義理滯知解匪徒加諸己且將淑諸人何哉蓋時有弗同而然也時弗同而心同則達摩氏之紓急救斃抑亦和尚之紓急救弊歟方今風俗偷薄叢林隳弛禪悅之理僅資笑談然欲以此事日相激揚有誰能領之者惟靈山最上一乘之旨開權顯實總攝羣機當象季衆生根器之利易以悟入而無梁宋諸家論議抵牾之陋徇緣適變不即不離宜取為法則焉堂處寺左而偏縈流依薄屋數十間中置佛菩薩像旁布几筵列牀帟鐙明爐熏坐具每月大合衆流習歲終修水陸齋事以善其成尤靖邃則虛之以待竁云此幻住之扁所從得也和尚嘗謂曰祕密理藏固無幻無不幻者如是而住其幻住乎顧生死復何所與哉子必為記之和尚名景湘生汪姓乃四明奉川人也初剃染於廣法院禮曇馨禪師受具聽律後遍參入雪竇野翁同公之室推為侍者掌藏鑰越明年主席天皇遷兹寺功業俱有碑碣可考至若耄期康健別創精廬以便燕私夫豈有他故哉則誠以統緒而迪似續也祖意教意或莫能辨契此翁在盍赴諸邑中而問焉至正三年四月望日吉旦徒弟淨滿如玉子願淨慈禪寺住持如玘同立石千佛閣記戴洵大司成號愚齋佛假名也一佛本無況千乎雖然佛者覺也覺者心也隨心所覺而行出焉隨行所成而佛名焉心無量則覺無量覺無量則行無量行無量則佛名無量而豈止於千乎故千行惟一心而千佛惟一佛雖然釋迦示衆又謂首華光下至毗舍浮為過去千佛首拘留孫下至樓至為現在千佛首日光下至須彌相為未來千佛而常住在世者則首普光下至一切法常滿為五十三佛首釋迦牟尼下至法界藏身阿彌陀為三十五佛共八十八佛則既實有是人實有是佛矣謂千佛惟一佛似又不可也雖然覺是行者心也具是心者人也行以表心而人以立行實有是心則實有是行實有是行則實有是人矣故舉一行以名一人而不可謂其心覺之不滿滿是心以全是覺而不可合其全覺以名人是故覺仁以行仁因名為仁人而非不義也覺義以行義因名為義人而非不禮也覺禮以行禮因名為禮人而非不智也覺智以行智因名為智人而非不信也覺信以行信因名為信人而非不仁也是故謂千佛非實有是人似又不可也雖然過去千佛可知也見在千佛可知也未來千佛釋迦雖聖何以逆知之乎謂將來千佛必有是人又似不可也雖然佛者覺也覺者法也法一而已法身一立則必有報身有化身而為三矣三而曰化則必化十化百化千化萬億而化無量矣故過去雖千佛而總一法身也見在雖千佛而總一報身也後來雖千佛而總一化身也故報身者法身之所報也化身者法身之所化也謂已能化之而又不能知之乎謂後來千佛必不可知其實有是人又似未可也雖然佛一而已三佛者一佛之所分也千佛者三佛之所化也不觀三佛則不知千佛之為統不觀千佛則不知三佛之為全迷則一佛且不知其所由也而況三佛乎而況千佛乎悟則知千佛即三佛也三佛即一佛也一佛本無佛也嗟乎佛者假名也假名者象教也象教者理真也由無佛而悟一佛由一佛而悟三佛由三佛而悟千佛由千佛而復悟無佛由無佛而復悟無量佛則知動色靜空二邊本無也有二邊者諍也過去見在未來三際本無也有三際者幻也中觀空觀假觀三諦本無也有三諦者著也無諍而又諍無幻而又幻無著而又著由是可以知無假之名可以見無象之教可以得無理之真矣其斯以為真空其斯以為法性其斯以為大覺乎今世佛寺必有三佛而千佛則多不具何也佛以法立法以僧行寺無真僧故人無真信人無真信故財無喜捨財無喜捨故象無莊嚴象無莊嚴故世無教化世無教化然則寺可廢也法可滅也是亦不足慮矣乎吾奉嶽林寺有僧曰真宗余嘗於二十年見之好酒任氣為僧未真也後數年而聞其長齋持戒未信之又數年而聞其説法化人未信之今特至嶽林訪之則見其莊嚴千佛妙相具足又修閣以安之皆出自金陵檀越度海歸山者也然則金陵之人已真信之真宗其庶幾真僧矣乎佛法當有興焉世之教化可廣也余日有望焉真宗其終勉之余故特為之記中興大中嶽林禪寺碑記賜進士第浙江等處提刑按察司使今升江西承宣布政司使雲間王日藻撰文通議大夫光祿寺少卿前欽差總理直隸刑名驛傳道按察司副使宋之鉉篆額文林郎知奉化縣事三韓蔡育秀立石昔余家食雲間每聞彌勒活佛道場去奉邑城東不下四五里許高敞壯麗蓋自唐僖宗朝活佛肩橫布袋親詣閩中募化杉木一袋而木不盈櫜約僧從井內取木日撈不竭遂建大雄殿千佛閣鐘樓經藏金剛寶塔藏柱雕龍時能轟雷閃電帶雨發聲及沐浴金沙豁開眼背叫徒入藏等事不勝私心嚮往者久之嗣後適有奉人楷菴禪師費隱容公之法孫也因伊師離言法公逝世吾邑紳襟請繼席超果禪寺為余言活佛道場始終巔末與余所前聞者悉相符合然興言及此輒以廢興成毀相尋無窮為感余固知楷公早有南音之隱思也後余宦遊四方楷公應奉邑士民敦請入院諸凡傾圮者修葺舊毀者重光且另搆天王殿裝塑四天王創造方丈兩楹大殿左右廊屋及廚房齋堂寮舍計六十間餘約費數千兩拮據勞神安排次第其神輸鬼運乎抑點鐵成金乎此與彌勒募木袋中後先輝映矣余聞而益為私心嚮往者久之余適典職兹邦楷公挂瓢肩笠訪余臬署談及寺志余欣然援筆為記嗟乎以余數十年夢寐嶽林之勝而不得遂者今幸得以文字挂名不朽快何如哉因敘其大略發檄行縣命工勒石以當遊觀以傳盛事至若寺中糧役向被俗僧紊擾今在甲外自運後之令兹土者讀余文而加禮焉庶可永遵為例俾勿壞云康熙庚申朔旦嶽林寺娑羅樹記周綸唐僖宗時布袋和尚手種娑羅樹於嶽林寺之崇寧閣前迄今發榮滋長高三丈許大一合抱初夏開花長尺餘色白如雪香似擁老梅沁人鼻觀八九月果熟大能利益人救人一切氣症住山楷菴和尚為方外老友楷公向挂錫我松超果寺支許交爭事公恐後臨去嶽林嘗屬彌勒傳序因悉嶽林名勝焉布袋和尚故彌勒化身嶽林東廊其端坐留偈處也娑羅樹出自西域布袋移根植此西域曰拘尸那揭羅國故城周十餘里城西北三四里渡阿恃伐底河西岸不遠至娑羅林其樹類槲而皮青白葉甚光潤五祖曰莫是和尚化後橫出一枝佛法否公其似乎楷公具戒定慧得真如法寶一日重來超果再屬余作娑羅樹記昔山谷有雙松堂詩曰文殊堂下松永日如鳴琴中有寂寞人安然無古今以公主席闡法蒼翠盈几案間花光四照人天瞻仰視寶手菩提手中出無量花差等余竊歎有心世道人不易多得願我佛取三千大千急用犍椎針砭一二無徒樹子楚楚分大醫王功德也日新堂記戴昆槱楷菴大師重興嶽林百廢具舉巍宮傑閣廣廈長廊或修或建靡不就緒輪奐已搆金碧斯輝駸駸乎大觀復矣古迹既新向往彌衆冠蓋之所往來杖履之所遊憩華蹤芳躅萃止日繁則為之設延待之區備叢林之制於殿之左建一堂焉楹敞棟高輔以羣室迎來畢具賓至如歸命之名曰日新題而揭於中焉夫日新之義見於儒經以勉學而進德也道可造於高明功必加於省惕進無止境日有改觀無亦使賢士大夫雅人名輩憩息於斯者覩名思義刮垢磨光勤修廣證新新無已增其向上之誠以羣趨於覺路也嗟夫世風日下道心惟微溺於聲利者方沉酣於五濁遑致意於三乘雖或因境而生心亦即興衰而遂止浮慕者多精求者少也至或藉佛法為懺過之資效清言為飾名之具錦繡其容土苴其腹假慈良而匿憸險者又往往然也苦海淪胥故我已喪則日見其敝之可哀耳亦何有於新哉登斯堂也其不惕然心動憬然顏頳耶夫半偈可以明心片言因之悟道昔人所以化導無方隨在警覺斯名之揭無問慧業文人頑冥鈍漢皆足以開其錮而引其萌則謂之當機一棒可也謂之頂門一針可也金繩寶筏洵無以過之矣蓋楷公之悲願普度深切為人之意已概見於斯也且輪奐者頽圮之藉也瓦礫者金碧之媒也千百年來廢興何數千百年後成毀何期後之於今亦猶今之於昔佛迹不磨道傳常繼將起而新之者又何限楷公於重新之際而復為是名也意或并出於此達識而預計之歟璧城方輯寺志索記於余謬以此言書之嶽林禪寺重修鐘樓記釋覺元逸菴住雪竇四明稱三佛地而奉化嶽林寺彌勒佛道場其一也自佛化現嶽林已來逮今千有餘歲中間興而廢廢而興不知凡幾蓋得其人則興失其人則廢固必然者余向覩寺之衰歷更主法俱不克振而去及今楷菴和尚一住則興百廢具舉不假餘力而頓還兜率天之舊觀豈非得其人而興者乎今丁卯清和復新懸鐘之樓高其榱桷壯其簷棟塗金刷碧耀日輝霞遐邇見聞莫不歎頌其弟子璧城戴居士念師締搆多艱感寺振興不易參考邑乘搜剔殘碑備悉寺之顛末輯為志書若干卷用傳諸遠訪余於寄廬併述寺鐘緣起命余作記余謝不敏而璧城請益堅余因詳夫鐘之設也司昏曉定陰陽警遠近惺聾聵故稱美叢林曰晨昏鐘鼓分明必有賢住持也況嶽林之鐘非僅為一寺之號令實為統邑之攸關創自元天曆間中興嶽林住持水南湘禪師厥功甚巨湘公即奉川人今中興楷公亦是奉川昔彌勒佛化現嶽林投機擊節弟子蔣摩訶今楷菴和尚光顯嶽林成裭裨贊弟子戴璧城何出處事迹之相類若是耶余於是知楷菴和尚者設非千百億化中之一身亦必水南湘公之再來也故與兹寺始終願力之堅之備也如此余愧不文不能綴述其萬分之一特為舉此以證嶽林道場之得其人耳康熙二十六年歲次丁卯夏午望日記指南軒記塢棐凡百招提入門見彌勒佛坦胸微笑其笑也何笑世人爭利爭名於朝於市貿貿焉相尋無窮而靡知所向是則其笑之者隱有以指之乎然謂以笑之者指之弗若以指之笑之也嶽林方丈側有軒顏曰指南説者以軒南向遂名之似矣抑知所由名之義乎夫佛法傳燈各有所指奈貪嗔癡輩塵沙填胸障乎凡穢目盲於朱紫耳聵於繁音不啻行積霧中晦暝渺茫莫知所歸故大覺世尊多方指示其義無上其法不二靈山會上以月指之也現身説法以身指之也象教流傳以象指之也經誦三千曹溪無一句以無言指之也教宗上乘馬祖一喝三日耳聾以有言指之也痛棒三頓如蒿枝拂以棒指之也指之而回南轅之岐路起欲海之陸沉昔有得天龍一指一生用不盡大矣哉指之為功乎楷公而前彌勒指之彌勒而後楷公指之不示其指於笑而示其指於軒然云指南者何昔黃帝擒蚩尤於涿鹿大霧迷幔苦無歸向爰作指南車以歸且指其為南餘則不指而自定指南軒亦猶指南車乎或曰聖人南面而聽天下向明而治故取諸此也無何也苦海茫茫迷津渺渺理欲之介毫釐千里指之以示所向即心即佛非心非佛各得所歸云爾是為記嶽林紀事戴明琮嶽林彌勒道場去縣治五里許面封山而帶龍溪稱四明三佛地之一世傳唐僖宗朝有布袋和尚示寂後復得其偈始知為彌勒云初布袋和尚募木閩中納之袋約僧取諸井不竭遂建精藍又於海濱壘塘捍潮得田二十頃餘歲收其入二事顯異何時人俱不識耶且崇樓寶閣燬而屢新安知非藉靈彌勒歟考古邑乘梁大同二年先建崇福院於溪西唐大中二年沙門間曠徙建溪東曰嶽林迄布袋和尚時幾三百載非因彌勒名也嗣後聖師如海印宣大川濟遞相登座揮麈代不乏人歷元至明崇寧閣每遭於火重建者三萬曆中住持南公等新大雄殿又數年僧守愚法緣協力募資并創崇寧閣守愚航海至閩購杉遇盜夜夢梵僧立其前盜驚疑而釋之法緣復被誣興販得叔祖銓部公書致當事幸脫厄回先是禪堂止司香火而房僧藉塗田之利別置蘭若厚藏恣睢明季漸衰膏腴半屬他有潮囓塘崩滄桑已變賦役仍存房僧逃絶精舍悉為丘墟糧無所歸責之禪衆歷年艱於質成重貽後纍廢興之際即慈氏亦無可如何耳康熙初延自間禪師株守踰年翛然告退旋請天伊禪師白之道憲王公疏免幸沿海上田奉旨遣棄虛糧盡捐而天伊適遭奇禍於是姚江解齊禪師應請而來憫惠政橋將傾行者病涉募資修葺功竣謝院事去遺僧鐵機積勤盜鬻宗器拆毀藏殿巨木而寺益敗壞癸丑季春本邑諸壇護請靈祐楷和尚慨然飛錫時香積塵埋僧舍頽圮饔飱且不繼遂甘清苦與衆操作未幾而佛像改觀越歲而天王殿成次年建左廊房寮舍二十六間右亦如之又次年創方丈及兩楹十餘間周匝垣牆約費數千金不重擾檀那已經營大備矣昔慈氏募木於閩世稱靈異師不從天降地出似有神運鬼輸則今之所有又安必昔之所無哉師在超果時學憲印周王公締交最善適升浙臬師擕杖渡江抵署談寺中顛末公乃手書碑文發檄行縣一齋蔡君勒石於天王殿之東勝因快事亦豈偶然哉琮鈍根下慧濫厠宗門不辭搦管之譏爰述其始終云爾
