body:
  text: 淡雪居士顧岱止菴鑒定奉川後學戴明琮璧城纂輯名釋宗源傳黃紹中邑侯宗源首座篤於修行究明經論能詩并擅草聖一生直截提持惟以法門鄭重宋徽宗崇寧三年召曇振禪師源隨入福寧殿巾侍悉周後臨終自書偈筆力視平昔特勝饒道者傳錢光祖邑侯宋紹興間有饒道者不知何許人目不識丁字惟事禪那參嶽林文嶽和尚喝下得省戊寅冬寺閣俱燬饒跪佛前燃臂立誓募建崇寧閣七載告成及終示微疾沐浴入龕說偈畢於彈指上歘然火起自焚是蓋得力於禪定以入滅者桂堂傳陸經正復古進士海慧字桂堂茸城陳氏子骨格飄然受具後遍參知識名山入超果楷公之室機緣相契上堂說法付衣復說偈曰透徹吾宗向上機崢嶸頭角𡚒雄威興雲布雨從君去普潤三千振祖基遂職以西堂康熙丁巳延主盤龍連丁𩜆饉翛然告退住奉川余家笆不踰年卧病忽淨身書偈云歸去好歸去好閒花落地無人掃鷓鴣聲裏夢還家蝴蝶枝頭蘿月曉擲筆奄然而化其語録尚未入梓有禪餘草行世天機傳項强恂如孝廉書記天機西塢化城院僧俗隸鄞邑性禀柔和好讀莊老而筆墨亦自可人入嶽林參楷菴和尚痛加鉗錘漸覺棒頭落處會悟山中百廢具興不辭勞苦康熙己未授拂遂得疾一日清晨集衆出鉢資三十兩造普同塔即午喚行者云我今去矣行者云何不說偈機云不說偈難道去不成話畢吉祥而逝幻夫傳釋行紹弘遠住雪竇幻夫珏禪師嶽林楷公嫡子也俗系剡城樓隘祝髮於大慕坪幼好吟詩逼似唐人口吻及長參方遍歷名山入雲間結社號法門騷客歸隱龍溪職典西堂嘗救親割股有蓼莪篇在田集廣布明州卧病擬放鰲詩曰曾在三山浮碧海橫眠宇宙跨金橋明晨吐霧翻身去頭角猙獰上九霄明早果示寂乙丑暮春宏音擕幻師靈骨至乞余入塔復述其概以識之塔銘明州府奉化縣嶽林定應大師塔銘并序崇寧五年特自西省編修官蒙恩除僉書武安軍節度判官㕔公事以道遠纍重擬求一近地居久之有道人擕小浮圖像過曰此聖僧也方自外來請售之家人輩不窮其語遂與百金貸之留佛室中大觀改元特得旨許免武安軍命就部領邑來此越三日謁祠廟至嶽林寺崇寧閣瞻禮定應師像乃與前日所售浮圖像不異由是感悟出處之不在人而知定應師有若預報不爽也因訪師出處之跡得皇祐中逸民張浩與前縣令都公所撰行狀及長者圓明録偈頌示現之事圓明曰定應歸寂二百年今塔在縣東北封山雖龕開人去當年塋寢於此願求文以銘其塔按僧贊寧撰高僧傳并劉繼業序事歷歷可據迄今存焉蓋師之出處應現與普照明覺同而形性乃與菩提達摩臨濟之普化等人謂之慈氏應世其詳不可得而知也銘曰定應法身若虛空應物現形水月中混塵示衆皆妙智程表莫測其高宏隨緣赴感證沙界一肩布袋無內外卷舒舉放傳上根喚醒迷途絶知解停雲寥廓忘今昔清風自傳瓶與錫鳥跡乘空聲度垣少林革履普化鐸演出菩提無量門不開貌相起沉淪悟士須知端的處寶燈續焰妙玄論有師圓明志堅固修葺幾經歲月暮巖生雲兮岫生風百世人依作甘露承議郎知明州府奉化縣管句學事兼兵馬司公事管句勸農公事黃特撰開法沙門圓明緝嶽林賜紫住持志宣立石重刻定應大師塔銘文定應大師者宋仁宗賜奉化縣布袋和尚號也自唐末出現於世至梁貞明三年端坐說偈示寂本寺晉天福初泉州莆田縣令王仁煦復見閩中得其親寫一偈後書九字云不得狀吾相此即是真始知示寂偈相為符合非彌勒佛之化身乎皇宋熙寧三年凡一百三十五祀莆田裔孫鑄尚能寶藏之𣈆安劉繼業摹其偈文并寫大師像刻石於宜春遺其九字元豐四年沙門宗尚得其本復刻石嶽林寺內踰年承事郎呂振來監明州市舶出其所藏九字遺住持沙門如恂刊於偈後蓋閩中所書真本也恂以幻相非和尚意命去之乃移偈新石後附九字將使見聞之者悟諸相之非相非徒為好事也考諸傳記歷有明徵惟縣令黃特所撰塔銘石刻久而隳泯往往主席者雖有志摹勒或作而復輟今住持復菴初禪師開法經年取為已任校其正文創亭於塔祠前購堅珉而重鐫之以崇舊觀季潭泐公書丹一初仁公篆額皆相其成也夫大士之神化奕奕在人耳目間豈尋常世諦語言文字所能增損然四方禮拜者苟無登載究知聖迹殊不愜其向慕之誠況大師入滅以來幾五百載而嶽林香火賴以不墜復菴汲汲焉注意於斯可謂知所本矣豫竊獲親見之將以結龍華會中參慈氏之勝緣非至幸歟洪武二十四年歲在辛未二月八日前台州瑞巖寺沙門存義識嶽林嗣法住持守初重立鼎建普同塔銘有序釋真承在昔姬文垂掩骼之仁莘野抱納溝之恥書有明徵可攬而誦也矧我如來以慈悲度世頑艷殊科統歸一致為其苗裔者勿思繼述慈悲一肩擔荷汗顏莫甚兹嶽林彌勒道場遡自五季梁代以還綿歷不知凡幾而普同塔曾未之前聞豈當時無暇旁及抑留以待後之學者補其缺略歟余於癸丑應檀那請勉主斯席積燬新創土木驟興且物力維艱捉襟露肘人亦未免誚譏而余安之若性何也既已圓頂方袍而下儷於圈牢芻豢大知其不可也所以數年內披榛範土鳩工庀材整葺殿宇莊嚴金相竭蹶不遺餘力僉曰落成汔可少休矣然委積殘骸風雨不蔽中心耿耿夙夜靡寧用是搜括枯囊暨徒天機助資外并募諸賢建普同塔於寺之東園時康熙乙丑十月望日吉辰也蓋至是而余之心乃大安今日者骨安有口以無口之口念無字經適凖西來不立文字之程骨安有手以無手之手輪如意珠堪嘲象罔求珠之誤骨安有足以無足之足朅來如飛竊比赤白乘雲之致骨安有眼以無眼之眼視於無形有何露柱燈籠之憾骨安有耳以無耳之耳聽於無聲自恰太音正希之旨總之骨已無身以無身之身逍遙於廣漠之野出入於無何有之鄉永脫有身是苦之患序畢而復系之以銘銘曰塔之中倥倥侗侗風雨密不通塔之外矗天三峰日月時過從塔之右臨梵王宮朝暮兮鼓鐘塔之左陸廟神封畫棟兮盤龍金沙湧兮溶溶潮水環兮潀潀挺翠柏兮偃蒼松靈骨呈祥兮牛斗之墟紫氣衝後序彌勒天下之彌勒也若溯其化身之處則必以吾剡嶽林為重余嘗閲彌勒傳封山碑洎家司成公千佛閣記僅得其住持大概恐達士高真慕名山禮活佛而來游兹土者未悉布袋始終山川勝蹟非所以傳示後世也久欲彚訂志書與雪竇雁宕天台諸山志並垂不朽惜為貧驅未暇一日方丈茶次楷和尚曰寺肇蕭梁迄今千有餘載燬復屢更非有以志之則今之廢而復興者安知其後之不興而復廢令活佛道場零落滅沒於荒煙蔓草間得不如今之悼昔乎遂謬承是役歲丙寅假館吳學士家不避寒暑草創分編為二至丁卯夏初稿脫方告竣適蓉湖淡雪先生覽勝而來棲遲兹地與吾師莫逆交蒲團佛火茗碗爐香之下輒取而較定之釐為六卷倘亦彌勒有靈默邀先生之鴻文以光厥集哉今而後浮圖殿閣異蹟奇觀盡從先生筆尖點出為布袋一放大光明也讀者須另具隻眼康熙丁卯仲秋日戴明琮敬題
