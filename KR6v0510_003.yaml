body:
  text: 淡雪居士顧岱止菴鑒定奉川後學戴明琮璧城纂輯法産嶽林寺清丈田地山人丁實數田共一百陸拾一畝玖厘陸毫地共一百一畝一分伍厘二毫山共叁百柒拾玖畝陸分丁共捌丁一分二厘口共二拾一口陸分捌厘按明嘉靖十一年謝澭纂奉化縣志為嶽林首剎常住田叁千肆百伍拾二畝山一千一百拾二畝陸分今廢法系梁大同二年僧始創溪西名崇福院姓氏無考唐閒曠達禪師諱延達四川人少時聰穎性質孤高後出塵遍參法席大中二年徙建溪東百廢具舉殿閣改觀遂號嶽林寺為開山第一祖焉布袋和尚師不知何許人也唐僖宗時見於明州奉化縣蹙額皤腹形體腲脮日夕寢食無常處世莫知其姓氏每以杖荷布袋且有十八小兒譁逐之不知所從來入𨞬肆聚落見醯醢魚葅輒乞入口餘以投袋中自號長汀子曾往閩化木一袋從寺井中出取之不竭嶽林梵宇大興共神異之梁貞明三年丙子三月師將示寂說偈曰彌勒真彌勒化身千百億時時示時人時人自不識偈畢即於本寺東廊下端坐磐石而化結龕封山為窣堵波賜額定應塔後復現于他州亦負布袋衆競圖其像有僧在師前行師撫其背僧回首師曰乞我一文錢曰道得即與師放下布袋叉手而立白鹿和尚問如何是布袋師放下布袋又問如何是布袋下事師負之而去保福和尚問如何是佛法大意師放下布袋叉手又問莫更有向上事否師乃負之而去師立街𠊓有僧問和尚在這裏作甚麼師曰等個人來曰來也來也師曰汝不是這個人師在閩中有陳居士謂師曰和尚此去不可墮他人是非師曰是非憎愛世偏多仔細思量奈我何寬却肚皮常忍辱放開笑口暗消磨若逢知己須依分縱遇冤家也共和能使此心無𦊱礙自然證得六波羅士曰和尚有法號否師曰我有一布袋虛空無掛礙展開遍十方入時觀自在士曰有行李否師曰一鉢千家飯孤身萬里遊覩人青眼在問路白雲頭士曰弟子愚頑如何得見佛性師曰即個心心心是佛十方世界最靈物縱橫妙用可憐生一切不如心真實士曰和上此去莫依族舍而住師曰我有三寶堂裏空無色相不高亦不低無遮亦無障學者體不如求者難得樣智慧解安排千古無一匠四門四果生十方盡供養居士異之復作禮留齊宿是夕師復書偈于門曰吾有一軀佛世人皆不識不塑亦不裝不雕亦不刻無一滴灰泥無一點彩色工畫畫不成賊偷偷不得體相本自然清淨非拂拭雖然是一軀分身千百億僧問如何降伏𡚶心師曰心是何物徒勞調伏妄本無根放下無跡諸緣擾攘一真寧寂如如法界體堂堂砍不破兮遮不黑師受田家齊田家問道師曰手揑青苗種福田低頭便見水中天六根清淨方成稻退後原來是向前師在大橋夜坐忽有强人窺探示以偈曰由貪淪墮世波中捨却貪嗔禮大雄直截凡情無所得圓明寂照汝心宗師出街衢見市人擠擠歎曰奔南走北欲何為百歲光陰頃刻衰自性靈知須急悟莫教平地陷風雷又曰趨利求名空自忙利名二字陷人坑疾須照娘生面一片靈心是覺王僧問如何是頓漸法門師曰汝心即聖智何須問次第聖凡都不到空華映日飛僧問如何是化導師曰肩挑日月橫街去把定乾坤莫放渠遇聖遇凡俱坐斷寂光勝地可安居僧問如何修持則勿虛生浪𣦸師曰無生無死佛家風不墮古今莫定蹤觸處圓明常湛寂龍華雞足兩無從僧問如何是道師曰碧水映孤峰寒潭迎皎月爾我不知宗須彌足底越附録蔣摩訶諱宗霸桐城縣函人即函亭侯裔也梁四明州評事罷官居於奉川考自蔣姓宗譜時與布袋和尚遊其出處飲食相往來尤密每日自課念摩訶般若波羅密多世因呼為摩訶居士初隱應家山距寺北六里創精舍以焚修名奉師塔至今猶存焉洎師示滅後復築菴於東湖跘跨山十二盤之高處以居畜一黃犬自衛頌布袋和尚曰兜率宮中阿逸多不離天界降娑婆相逢為我安心訣萬劫千生一剎那逮蜀使致師命歸即設齊會親友沐浴趺坐而逝塔全身於盤山頂上宋圓明禪師師福州陳居士裔孫得法於東林照覺延主寺事重修大殿兩廡并創東西方丈規模丕振大暢宗風遠近名緇雲集洵稱為嶽林開法之祖焉年八十有四沐浴更衣端坐而逝上堂云從來學道原非易鐵石心肝始自堅不用思維尋古句還須努力向前參忽然露出虛空骨直下當知般若船一點湛湛無所繫月明遐嶼水中天揮拂子海印宣禪師諱志宣宋真宗賜紫主席嶽林創立定應大師塔碑邑侯黃敬山特撰銘頌世尊初生曰抉霧騰騰下大荒指天指地不尋常雲門忒煞唇皮快無限癡人漫度量穎悟聰禪師諱廣聰杭州人初參雪竇顯得省入嶽林海公之室命主維那一日海下堂云穎維那在此堂中還知彌勒消息也未師云此處無銀三十兩海云也須著地還錢師云蒼天蒼天海呵呵大笑而出越明年付衣拂繼席嶽林上堂云嶽林這裏龍溪水白浪滔天崇寧閣回出青霄汝等諸仁向什麼處攀仰時二僧並出師云一箭落雙鵰一僧喝師云這一喝未有主在一僧作禮師云汝見什麼道理僧以坐具打圓相師云弄虛頭漢僧便喝師云果然宗尚禪師師元豐四年住持門庭整肅不以外護營心稍不如意拽杖便行年五十餘辭世僧問如何是嶽林境師云娑羅遍覆雲來影如何是嶽林人師云高提七尺辣烏藤人境已蒙師指示轉身一句作麼生師云腳跟踏破錦乾坤如恂禪師師住持嶽林刊布袋和尚一偈於石并所書真本九字承事郎呂振親授也僧問天上無彌勒地下無彌勒即今在什麼處師云錯過了也僧云主賓互唱覿面相逢且道是誰錯者師云汝錯過了也僧喝師打云錯過了也曇振禪師師嗣瑞巖鴻崇寧三年徽宗皇帝於福寧殿賜紫衣後建崇寧閣越十年示疾集衆焚香跏趺而逝示衆云今日布袋頭開還有買賣者麼時有僧出云有師云不作貴不作賤作麼生酬價僧無語師云老僧失利便歸方丈宏智覺禪師諱正覺隰州李氏子七歲日誦數千言十五剃染十八遊方受具慈雲智瓊律師得法於丹霞淳初住泗州普照寺繼住舒州太平江州圓通能仁真州長蘆晚住天童應嶽林之請遂回太白惟宋樓鑰公一詩載在邑乘紹興丁丑十月七日別郡紳檀那翌日辰時沐浴更衣端坐說偈曰夢幻空華六十七年白鳥煙沒秋水連天擲筆而逝龕留七日顏貌如常丙午乃奉全身葬於東谷龍圖閣學周葵撰銘文嶽中禪師諱行中紹興間寺經回祿而閣俱煨燼時有饒道者燃一臂化緣重建寶閣有十景題咏上堂僧問一莖高竪寶閣凌空未審有何祥瑞師云雲際橫梁懸日月大千沙界悉光輝進云今朝布袋重提起兜率玄風播宇寰師云讃歎有分進云還是神通妙用為復法爾如然師竪拂云所仗這一點兒進云某甲到這裏有口難辨請和尚別轉機輪師便喝僧亦喝師云知恩者少乃云星飛電轉作用通天玉振金聲風光動地今日到這裏不是神通妙用亦非法爾如然且道畢竟承誰之力以拄杖畫一畫云的的沒量大人總不出這點光明不得大川濟禪師諱普濟奉川林氏子披剃棲真得法於浙翁琰琰嗣佛光照照嗣大慧杲嗣師法者天童石門來雪竇野翁同住嶽林赴臨安靈隱之請後曾撰修五燈會元二十卷行世題世尊出山相曰龍章鳳質出王宮肘露衣穿下雪峰智願必空諸有相不知諸有幾時空益州懷禪師師嗣智環公環嗣大璉公乃雲門宗第七世也受奉川紳襟之請主持寺事置産業修殿堂至老而寂僧參師問到此作麼僧云特參布袋和尚師云布袋和尚即今在什麼處僧禮拜師云你見什麼道理僧擬對師便打正眼具禪師諱炳具義烏王氏子與獨菴禪師為友師誕日上堂汝等東走西走不如覿面一覯山僧母難之辰拂拂清風滿袖無端舉示禪流也是一場漏逗光陰迅速如馳且莫尋言討句急須早早回頭看取父母未生前的無量壽大衆且道如何是無量壽以拂子倒握云相救相救下座頌魯祖面壁曰池陽面壁成何事無數英雄當下收大抵還他肌骨好不搽脂粉也風流已上宋室禪師俱依年號編次載封山塔碑誤元栯堂益禪師師溫州人嗣法於徑山珍禪師有法語載五燈續略山居詩四十首行世上堂古者道我這裏無法與人只是據欵結案彰聖這裏亦無法與人亦不據款結案拈拄杖云如何是佛赤腳踏蓮華如何是佛向上事雕梁畫棟擲下拄杖便歸方丈二月十五日上堂擊拂子一下云彰聖今日將三十年前冷灰爆出烏豆換老胡眼睛去也喝一喝曰設有一法過於涅槃我此一喝不作一喝用此二則係彰聖法語緣遍尋全録無蹤今識之以存一代住持水南湘禪師諱景湘奉川汪氏子披剃廣法禮曇馨為師精持律儀氣宇溫和入雪竇野翁同公之室巾侍二年付以衣拂受請於天皇遷兹寺晚居嶽林座下名緇蟻附募鑄大鐘確有成勩行道之餘建幻住經堂佛懿禪師曇噩為記師誕日上堂天高氣爽勝巖阿竹杖閒擕帶月歌一枕繩牀忘歲序任教滄海泛清波麻衣淡飯隨緣過懶向人前說法多只在廣平湖龍溪畔一醉清風是什麼敢問大衆若說即此便是頭上安頭若說即此不是浪裏淘沙正當恁麼時畢竟如何是以拂子打云秋水長天一色落霞孤鶩齊飛性初聞禪師諱壽聞係吉安人得法於靈隱聳主席年餘結廬天台華頂峰僧參師問仙鄉何處僧云吉安師云原來是鄉里僧云不敢師云還帶得鄉里人事來麼僧無語師云將謂是鄉里原來假的明復菴初禪師諱守初洪武二十四年住持創亭封山塔祠之前校其正文重鐫定應大師塔銘以崇舊觀季潭泐公書丹一初仁公篆額重刻封山塔碑說偈募衆云宋室遺文蓋有年離離斷碣卧荒煙堪憐聖蹟俱烏有扶起還須古越賢真宗忞禪師諱元忞隆慶間住持修崇寧閣裝嚴千佛大司成愚齊公常往來問道有千佛閣記其上堂語録失傳自梁至明年代荒遠行業祖系十失其七矣及閲封山塔院碑文與布袋和尚傳記內稱住持沙門嗣法詳明者俱登祖位外此或混禪師代數并明季僧會盡行削之不敢濫入但碑列七十有三其間佩服心印亦難委悉名字姑附如兀峰峻海月朗戒定振隱菴顯大同全東雙穎嶮崖遇泥犂印足翁一菴仰癡翁瑩南𡶩嶽不倚中絶崖恩古航慈石心圮梵中節孚中信象先輿璞先珵可中然東明晟虛舟濟獨任荷白雲閒性海筏古光覲古嵓嶙菴貞草堂閒諸師俟博雅者考訂補入皇清自閒覺禪師諱行覺蜀之重慶合州金氏八歲隨父禮本邑當馬山太空師脫白十九出山聽教二十六受具於天童密老人參萬法歸一話驀觸露柱有省拈偈云心佛衆生三無差別撞破乾坤露柱饒舌後得法於林野和上是歲甲申三十有五也初住嘉定羅漢寺繼住崇明慈濟奉川法海壬寅之冬請主嶽林後受芙蓉之請於順治十八年十二月十七日沐浴更衣書偈而逝世壽五十三僧臘二十八嗣法弟子三十三人建塔於寺之屏風山麓上堂古殿洞明溪光散彩崇寧聳翠嶽色增輝打開本有家風撥轉從前氣象是處是慈氏無門無善財慣與十八孩兒同門出入一天風月獨自逍遙高枕瓶盂橫拖布袋在市盈市在村滿村與狸奴白牯同唱無生之曲蝦蟆蚯蚓共轉根本之輪水到渠成山堆海集且道報國裕民一句又作麼生四明山月朗三佛地風清天伊澐禪師諱行澐俗系姚江嗣浮石賢禪師傳臨濟三十二世康熙乙巳冬主席嶽林時山海作祟拮据經營糧役僅有其緒上堂云解開布袋頭放出百千牛撞倒須彌山上頂踏翻華藏海中漚直得燃燈寶體分身無量普光爍破四洲堪嗟糞草堆邉爛籌子臭氣尚未脫也與麼隨人打鬨行色匆匆引教木上座咬碎拇指忍笑不禁只得唱個啝啝曲子一任瞎驢趂大隊由他鮑老送燈臺雖然若到諸方去休云見我來擲下拂子解齊純禪師諱行純舜江人得法於牧雲門和尚嗣臨濟三十二世康熙戊申受嶽林之請修惠政橋告成即退院歸里上堂僧問飛錫三山天地震祥雲起處遍乾坤祝聖開堂於此日斬新條令事如何師云天高羣象正進云恁麼則兵隨印轉將逐符行師云海濶百川朝進云九重深密全尊貴赫赫威光震九垓師云朝到西天暮歸東土乃云昔年曾向剡溪游未遇知音暫且休今日復從溪上住金沙灘裏一拋鈎大衆山僧蒙十方檀護本山耆宿特地相邀隨緣住此嶽林光祖道闡宗風攢花簇錦自有諸方臨濟喝德山棒雲門餅趙州茶冊子上歷歷分明山僧才踈德鮮薄福少緣皤然鬚髮不諳世故向此鼓舌搖唇作麼久參上士未舉先知後學初機一任吞吐遂竪拂子云紹隆惟孝子匡弼在能臣復舉古德云向上一路千聖不傳又有道向上一路千聖不然嶽林者裏不說向上亦不說向下逢人便笑還有薦取者麼卓拄杖兩下楷菴承禪師諱真承字緒芳別號楷菴俗隸奉川茅嶼鮑氏子十八依大顯師剃度二十七受具於天童牧雲禪師朝夕苦參不得入路一日擔柴遭跌有省作偈云未知生焉知死輪回覓處無起止白雲盡處見青山行人不在青山裏次參寶慶離言和尚問自遠趨風乞師一接離云放下著師云欲窮千里目更上一層樓離云更放下著師禮拜云謝師答話充侍寮一日看朝宗録云我手何似佛手答云某甲也有師遂大徹離問羅堠羅以何為第一師云寧可截舌不犯國諱離休去頌臨濟三頓棒云患得秦朝毒良哉楚國醫只消灸一艾脫骨換新皮三十一佛成道日離付師拂子源流職南禪西堂東歸住靜五龍山受邑南登山之請後住台州香嵓廣福松江超果普照嘉興靈祐諸剎今住嶽林重新彌勒道場有全録十卷并崇寧閣詩集行世嗣法另刊兹不載上堂嶽林古剎彌勒道場天高地迥水遠山長兜率樓閣儼然布袋典型猶在今朝法筵大啓凡聖交參丕振千年福地全彰古佛家風揭示滹沱的旨洞明少室真機諸佛不傳之妙心切須頓契父母未生之面目直下圓成若也坐斷千差猶是釘樁搖櫓更乃棒喝交馳未免拖泥帶水驀竪拂云這個千聖同其源萬靈合其轍向無言處演言無事處作事無佛處現佛無祖處示祖直得木人拍板石女謳歌寒嵓發焰枯木糝花國運與佛運齊興皇風與宗風並扇雖然如是這猶是利生邊事且道如何是向上事大野風清三佛地一天月朗四明州復舉布袋和尚偈云彌勒真彌勒化身千百億時時示時人時人自不識師云這老漢負著布袋等個人來大似靈龜拽尾臨末梢頭又恁麼道未免手腳俱露且道這老漢意在於何從前汗馬無人識只要重論蓋代功冬至上堂璧城居士問簾外三竿日新添一線長文字語言都掃却圓機暗合請師宣師云合却口門問將來士左劃云是什麼師左一拂士右劃云是什麼師右一拂士云左右逢源前後斷大千沙界獨稱尊師云如何是獨尊之旨士云天不能蓋地不能載師云非公境界乃云晷運推移日南長至佛法大意如何話會若也會得野外梅開一朵兩朵全彰格外風規池上冰浮四片五片獨露寰中節令靈雲桃香巖竹大有生機柏樹子麻三斤徐增意氣因甚燈籠與露柱長年如是揮拂云寒來暑往無遷變鐵石身心不受磨喝一喝竪天王殿上堂竪一柱高拄乾坤架一梁普擎日月大機圓應大用縱橫大施門開大功克就風調雨順海宴河清全彰彌勒家風丕煥山門氣象不是神通妙用亦非法爾如然且道畢竟成誰功幹拈拄杖云瓊樓玉殿一莖草福國裕民億萬年下座
