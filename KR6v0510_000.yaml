front:
  text: 嶽林寺位於浙江奉化縣治東北之三山中縣治雉門之東為龍溪溪自鎮亭發源由惠政橋繞至寺前三山為嶽林之主峰其脈自南來入廣平源過峽即三山高有丈許梁大同二年五三六於龍溪之西建崇福院唐相李紳書額會昌中八四一八四六毀宣宗大中二年八四八間曠禪師徙建溪東改嶽林寺僖宗時八七四八八八有僧遊寓常擕布袋乞食人稱為歡喜和尚自號長汀子至貞明三年九一七坐東廊磐石説偈而逝衆僧神異之寺乃以彌勒道場為俗所重為明州三大佛教聖地之一宋真宗大中祥符八年一一五賜額大中嶽林禪寺徽宗賜號崇寧閣元明兩代興廢屢更至清康熙十二年一六七三楷菴和尚入院大暢宗風皈依雲集重新殿閣楷公和尚以舊無寺志乃請戴明琮草創明琮於康熙二十五年一六八六假館吳學士家纂輯志稿次年一六八七夏初稿告竣時淡雪居士顧岱攬勝茲寺乃取以校定釐為六卷分目為十寺圖梵宇名勝古迹法産法系藝文詩賦名釋塔銘寺圖所繪乃康熙間之現觀劉鴻聲撰圖説以附之梵宇記嶽林禪寺及其殿閣堂院之建置沿革名勝記此寺之勝概古迹記大鐘布袋和尚行臥處彌勒涅槃石等法産則記田地山丁口之實數法系記自唐之間曠達至清康熙間楷菴承共記二十二位禪師藝文一門收序記傳三目詩賦一門請啓募疏附焉名釋一門傳宗源饒道者桂堂天機幻夫之行誼塔銘一門録定應大師與鼎建普同之塔銘集康熙以前本寺文獻之大成茲據國立中央圖書館藏清康熙間刋本景印敕賜大中嶽林禪寺序按浙省志書明州著三佛地其一為彌勒道場世所傳長汀子恆攜布袋自隨遊行度世遺迹即奉化縣敕建嶽林寺是也寺創唐大中自僖宗朝迄今約八百餘載其間興壞屢更而封山一片石香火巍然獨存雖販夫村婦無不知有活佛隱身處敬禮之恐後噫嘻何其神哉蓋天下無二道聖人無兩心三教莫為之前雖美弗彰莫為之後雖盛不傳嗣法之隆替亦難言矣丁卯夏季余以放廢落拓江湖間遇楷公和尚於嶽林晤對經旬相視莫逆其後長汀而振法者非斯人而誰歟奉邑土瘠民貧俗儉朴康熙初寺僧因逋糧他徙以故寮舍盡傾殿閣皆置瓦礫中楷公杖錫來此出其法力悉舉而新之耳目改觀時邑中士大夫及鄉里父老無不以是為楷公頌而余之所以頌楷公者固不在是方今世教波靡人心陷溺彼金玉其外敗絮其中者未嘗不卓然自命主持法輪求其能淡朴真如實證無相成己兼成物者蓋亦罕矣以余觀楷公於書無所不窺於事無所不歷於心無所不空於世無所不度固將矯斯世之積弊以振聾發瞶亷頑立懦此雙林大士亦當為額首稱道歡喜接引者也余獨訝彌勒世尊示現塵寰雖酒壚屠肆其隨口指授皆法印心宗乃誠信皈依者僅得蔣摩訶一人足徵耳食者多慧眼正復不易余性根久錮今得謝棄一切與楷公參究大事因緣且獲瞻依法像頂禮定應寶塔則又余之私幸也夫戴子葺志成遂書此以為序時康熙二十有六年歲次丁卯六月望日淡雪居士顧岱止菴撰嶽林寺志序剡上以彈丸小邑僻處海隅其俗儉陋而民淳無錦繡珠玉之飾泉刀枲布魚鹽之饒無園林陂池臺榭為燕樂之所無琳宮貝宇極金碧莊嚴之觀正如子瞻在儋州時大率皆無耳豫才識暗淺竊幸兹土僻簡可安吾拙兩年來公庭閴寂吏抱文牘判紙尾外無他事然亦鹿鹿無寧時聞雪竇山水奇秀為東南絶勝思一登其巔而未有暇也東郊外距城三里有嶽林寺長吏迎春講社歲一至再至焉豫見其殿閣嵯峨左右禪房歷歷備具雖悃愊無而花竹暢茂差可遊息顧謂諸父老曰此奉邑之所絶無者而何以有是哉或告之曰是唐大中時敕建布袋老人顯化處鞠為茂草久矣近庀材而更新之惟和尚楷菴是賴楷公曰山衲何功之有實藉雲間諸檀那廣種福果前邑侯曹公護持之力居多豫不覺瞿然曰是何言之謙而避之深也凡物之成壞有數而興廢在人若非道力超羣法緣幅湊曷由致是越一年丁卯楷菴手一編示豫曰嶽林舊無志書今寺已落成法鼓復振恐湮沒無考不得有傳於後是以璧城志之請豫文辨其首豫曰可哉子之遠慮也今上振興文教命諸儒臣纂輯一統志海內名山古剎俱搜採編入嶽林彌勒道場為四明法窟則寺志誠不可少况豫同鄉賢士大夫好善樂施前輩曹公教養元元共成不朽盛事楷菴經營有年手口卒荼誠孚遐邇非衲子時輩所可及則昔日所無不妨為今之所有是皆不可以不記也於是乎書錫山施則曾省園氏題明州嶽林寺志目録卷一寺圖梵宇卷二名勝古迹卷三法産法系卷四藝文序記傳卷五詩賦請啓募疏附卷六名釋塔銘敕賜大中嶽林禪寺嶽林圖説嶽林建于晚唐舊時紺宇珠宮遺圖尚在明季衰廢不可復睹矣自楷公中興締造增煥因編寺志繪圖以辨於首蓋嶽林居縣治東北種一邑之龍秀繪寺必先繪縣治其發源也雉門之東為龍溪惠政橋而下金沙擁秀水繞寺門殿閣巍峩回廊修整披圖而見楷公拮搆苦心矣西為封山彌勒真身在焉乃寺之祖隴固當與寺俱傳至若陸公祠普惠寺普同塔形勢相附例應並繪後為三山廣平湖寺之坐山入之尺幅中矣東為長汀金鐘屹峙錐塔砥流善塘之拱護驛道之紛馳并繪之以集其全一圖一書而志乃成于是乎招提勝槩盡從摩詰點染出矣邑人劉鴻聲識
